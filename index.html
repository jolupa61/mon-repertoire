<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Répertoire de A à Z</title>
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        /* --- Styles spécifiques pour l'affichage plein écran sur Mobile --- */
        @media (max-width: 768px) {
            /* On s'assure que le conteneur principal laisse voir l'alphabet */
            .app-container {
                display: flex !important;
                flex-direction: column !important;
                position: relative;
                height: 100vh;
            }
            
            /* L'alphabet reste bien en place en haut */
            .onglets-az {
                display: flex !important;
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                padding: 10px !important;
                background: #f8f9fa;
                z-index: 2;
            }

            /* La liste des contacts doit occuper l'espace sous l'alphabet */
            .liste-contacts {
                display: block !important;
                flex: 1;
                padding-top: 20px !important;
            }

            /* La fiche contact vient se superposer UNIQUEMENT quand elle est activée */
            .fiche-contact {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100% !important;
                height: 100vh;
                background-color: white;
                z-index: 99; /* Passe au-dessus de tout */
                padding: 20px !important;
                box-sizing: border-box;
            }

            /* Quand on clique sur un contact, la fiche passe au-dessus */
            .fiche-contact.mobile-active {
                display: block !important;
            }

            /* Style pour le bouton retour de la fiche */
            .btn-retour-liste {
                display: inline-block;
                background-color: #7f8c8d;
                color: white;
                border: none;
                padding: 10px 15px;
                border-radius: 4px;
                font-weight: bold;
                margin-bottom: 20px;
                cursor: pointer;
                font-size: 1rem;
            }
        }

        /* Masquer le bouton retour liste sur ordinateur */
        @media (min-width: 769px) {
            .btn-retour-liste {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- PAGE DE GARDE -->
    <div id="pageGarde" class="page-garde">
        <div class="contenu-garde">
            <h1>Mon Répertoire</h1>
            <p>Votre carnet d'adresses de A à Z</p>
            <button onclick="ouvrirRepertoire()" class="btn-entrer">Ouvrir le répertoire</button>
        </div>
    </div>

    <!-- APPLICATION -->
    <div class="app-container cacher">
        <!-- BOUTON RETOUR PAGE DE GARDE -->
        <button onclick="fermerRepertoire()" class="btn-retour-garde">🚪 Quitter</button>

        <!-- 1. Onglets A-Z -->
        <nav class="onglets-az" id="ongletsAZ"></nav>

        <!-- 2. Liste des Contacts -->
        <section class="liste-contacts">
            <div class="liste-header">
                <h2>Contacts</h2>
                <button class="btn-ajouter-contact" onclick="ouvrirFormulaireAjouter()">➕ Ajouter</button>
            </div>
            <div id="zoneListe"></div>
        </section>

        <!-- 3. Fiche Détail -->
        <section class="fiche-contact" id="ficheContact">
            <!-- Bouton Retour Liste visible uniquement sur Mobile -->
            <button onclick="retourALaListe()" class="btn-retour-liste">⬅️ Retour à la liste</button>
            <h2>Détails du Contact</h2>
            <div id="zoneFiche" class="fiche-vide">
                <p>Sélectionnez un contact pour afficher ses coordonnées.</p>
            </div>
        </section>
    </div>

    <!-- POP-UP FORMULAIRE (Ajout/Modification) -->
    <div id="zoneFormulaire" class="modal-formulaire cacher">
        <div class="contenu-formulaire">
            <h3 id="formTitre">Nouveau Contact</h3>
            <form id="formContact" onsubmit="soumettreFormulaire(event)">
                <label>Nom et Prénom :</label>
                <input type="text" id="inputNom" required placeholder="Ex: Dupont Jean">

                <label>Téléphone Fixe :</label>
                <input type="text" id="inputFixe" placeholder="Ex: 01 02 03 04 05">

                <label>Téléphone Mobile :</label>
                <input type="text" id="inputMobile" placeholder="Ex: 06 07 08 09 10">

                <label>Adresse postale :</label>
                <input type="text" id="inputAdresse" placeholder="Ex: 12 rue de la paix">

                <label>Photo (depuis l'album) :</label>
                <input type="file" id="inputPhoto" accept="image/*">

                <div class="form-boutons">
                    <button type="button" class="btn-annuler" onclick="fermerFormulaire()">Annuler</button>
                    <button type="submit" class="btn-valider">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT APPLICATION -->
    <script>
    let contacts = null;
    try {
        contacts = JSON.parse(localStorage.getItem("mes_contacts"));
    } catch (e) {
        console.log("Stockage restreint.");
    }

    if (!contacts || contacts.length === 0) {
        contacts = [
            { id: 1, nom: "Abid Amine", fixe: "01 23 45 67 89", mobile: "06 12 34 56 78", adresse: "12 Rue de Paris, 75001 Paris", photo: "" },
            { id: 2, nom: "Bernard Chloé", fixe: "02 34 56 78 90", mobile: "07 89 01 23 45", adresse: "45 Avenue de Lyon, 69002 Lyon", photo: "" },
            { id: 3, nom: "Dupont Jean", fixe: "03 45 67 89 01", mobile: "06 99 88 77 66", adresse: "8 Boulevard de la Mer, 13008 Marseille", photo: "" }
        ];
        sauvegarder();
    }

    let lettreActive = "";
    let contactEnCoursDeModification = null;

    function sauvegarder() {
        try {
            localStorage.setItem("mes_contacts", JSON.stringify(contacts));
        } catch (e) {}
    }

    function ouvrirRepertoire() {
        document.getElementById("pageGarde").classList.add("cacher");
        document.getElementById("ongletsAZ").parentElement.classList.remove("cacher");
        
        lettreActive = ""; 
        genererAlphabet();
        retourALaListe();
        
        const zoneListe = document.getElementById("zoneListe");
        if (zoneListe) {
            zoneListe.innerHTML = `<p style="color:#7f8c8d; padding:10px; text-align:center;">Choisissez une lettre pour afficher les contacts.</p>`;
        }
    }

    function fermerRepertoire() {
        document.getElementById("pageGarde").classList.remove("cacher");
        document.getElementById("ongletsAZ").parentElement.classList.add("cacher");
        retourALaListe();
        
        const zoneFiche = document.getElementById("zoneFiche");
        if (zoneFiche) {
            zoneFiche.className = "fiche-vide";
            zoneFiche.innerHTML = `<p>Sélectionnez un contact pour afficher ses coordonnées.</p>`;
        }
    }

    function retourALaListe() {
        document.getElementById("ficheContact").classList.remove("mobile-active");
    }

    function genererAlphabet() {
        const zoneOnglets = document.getElementById("ongletsAZ");
        if (!zoneOnglets) return;
        zoneOnglets.innerHTML = "";
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(lettre => {
            const bouton = document.createElement("button");
            bouton.textContent = lettre;
            if (lettreActive && lettre === lettreActive) bouton.style.color = "#3498db";
            bouton.onclick = () => {
                lettreActive = lettre;
                genererAlphabet();
                filtrerContacts(lettre);
                retourALaListe();
            };
            zoneOnglets.appendChild(bouton);
        });
    }

    function filtrerContacts(lettre) {
        const zoneFiche = document.getElementById("zoneFiche");
        if (zoneFiche) {
            zoneFiche.className = "fiche-vide";
            zoneFiche.innerHTML = `<p>Sélectionnez un contact pour afficher ses coordonnées.</p>`;
        }

        const zoneListe = document.getElementById("zoneListe");
        if (!zoneListe) return;
        zoneListe.innerHTML = "";
        
        const contactsFiltres = contacts.filter(c => c.nom && c.nom.toUpperCase().startsWith(lettre));
        if (contactsFiltres.length === 0) {
            zoneListe.innerHTML = `<p style="color:#7f8c8d; padding:10px;">Aucun contact en ${lettre}</p>`;
            return;
        }
        
        contactsFiltres.sort((a, b) => a.nom.localeCompare(b.nom));
        contactsFiltres.forEach(contact => {
            const ligne = document.createElement("div");
            ligne.className = "ligne-contact";
            ligne.textContent = contact.nom;
            ligne.onclick = () => afficherFiche(contact);
            zoneListe.appendChild(ligne);
        });
    }

    function afficherFiche(contact) {
        const zoneFiche = document.getElementById("zoneFiche");
        if (!zoneFiche) return;
        
        const photoAffichage = contact.photo ? contact.photo : "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        
        zoneFiche.className = "fiche-active";
        zoneFiche.innerHTML = `
            <div class="fiche-header">
                <img src="${photoAffichage}" alt="Photo" class="contact-photo">
                <h3>${contact.nom}</h3>
            </div>
            <div class="fiche-details">
                <p><strong>📞 Fixe :</strong> ${contact.fixe}</p>
                <p><strong>📱 Mobile :</strong> ${contact.mobile}</p>
                <p><strong>🏠 Adresse :</strong> ${contact.adresse}</p>
            </div>
            <div class="fiche-actions">
                <button class="btn-action btn-modifier" onclick="ouvrirFormulaireModifier(${contact.id})">✏️ Modifier</button>
                <button class="btn-action btn-supprimer" onclick="supprimerContact(${contact.id})">🗑️ Supprimer</button>
            </div>
        `;

        document.getElementById("ficheContact").classList.add("mobile-active");
    }

    function ouvrirFormulaireAjouter() {
        contactEnCoursDeModification = null;
        document.getElementById("formTitre").textContent = "Nouveau Contact";
        document.getElementById("formContact").reset();
        document.getElementById("zoneFormulaire").classList.remove("cacher");
    }

    function ouvrirFormulaireModifier(id) {
        const contact = contacts.find(c => c.id === id);
        if (!contact) return;
        contactEnCoursDeModification = id;
        document.getElementById("formTitre").textContent = "Modifier le Contact";
        document.getElementById("inputNom").value = contact.nom;
        document.getElementById("inputFixe").value = contact.fixe;
        document.getElementById("inputMobile").value = contact.mobile;
        document.getElementById("inputAdresse").value = contact.adresse;
        document.getElementById("zoneFormulaire").classList.remove("cacher");
    }

    function fermerFormulaire() {
        document.getElementById("zoneFormulaire").classList.add("cacher");
    }

    function soumettreFormulaire(event) {
        event.preventDefault();
        const fichierPhoto = document.getElementById("inputPhoto").files[0];
        
        function enregistrerLeContact(photoData) {
            const nouveauContact = {
                id: contactEnCoursDeModification ? contactEnCoursDeModification : Date.now(),
                nom: document.getElementById("inputNom").value,
                fixe: document.getElementById("inputFixe").value,
                mobile: document.getElementById("inputMobile").value,
                adresse: document.getElementById("inputAdresse").value,
                photo: photoData
            };

            if (contactEnCoursDeModification) {
                if (!fichierPhoto) {
                    const ancienContact = contacts.find(c => c.id === contactEnCoursDeModification);
                    nouveauContact.photo = ancienContact ? ancienContact.photo : "";
                }
                contacts = contacts.map(c => c.id === contactEnCoursDeModification ? nouveauContact : c);
            } else {
                contacts.push(nouveauContact);
            }

            sauvegarder();
            fermerFormulaire();
            if (nouveauContact.nom) lettreActive = nouveauContact.nom.charAt(0).toUpperCase();
            genererAlphabet();
            filtrerContacts(lettreActive);
            afficherFiche(nouveauContact);
        }

        if (fichierPhoto) {
            const reader = new FileReader();
            reader.onload = function(e) { enregistrerLeContact(e.target.result); };
            reader.readAsDataURL(fichierPhoto);
        } else {
            enregistrerLeContact("");
        }
    }

    function supprimerContact(id) {
        if (confirm("Êtes-vous sûr de vouloir supprimer ce contact ?")) {
            contacts = contacts.filter(c => c.id !== id);
            sauvegarder();
            filtrerContacts(lettreActive);
            retourALaListe();
        }
    }
    </script>
</body>
</html>
