<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Répertoire de A à Z</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        /* --- DESIGN GÉNÉRAL ET POLICES --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f6fa;
            color: #2c3e50;
        }

        .cacher {
            display: none !important;
        }

        /* --- PAGE DE GARDE STYLE CARNET PLEIN ÉCRAN --- */
        .page-garde {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: #2c3e50;
            text-align: center;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .page-garde::before {
            content: '';
            position: absolute;
            top: 0;
            left: 5px;
            width: 16px;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                #bdc3c7 0px,
                #95a5a6 6px,
                #7f8c8d 12px,
                transparent 12px,
                transparent 32px
            );
            box-shadow: 4px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .contenu-garde {
            padding: 20px;
            width: 80%;
            max-width: 400px;
            box-sizing: border-box;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contenu-garde h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-family: "Georgia", serif;
            color: #f5f6fa;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }

        .contenu-garde p {
            font-size: 1.3rem;
            font-style: italic;
            color: #bdc3c7;
            margin-bottom: 50px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        .btn-entrer {
            background-color: #d35400;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.3rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: all 0.2s;
            width: auto;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .btn-entrer:hover {
            transform: scale(1.02);
            background-color: #e67e22;
        }

        /* --- APPLICATION (ORDINATEUR) --- */
        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        .btn-retour-garde {
            position: absolute;
            top: 15px;
            right: 25px;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 10;
        }

        .onglets-az {
            width: 60px;
            background-color: #ffffff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 0 10px 0;
            overflow-y: auto;
        }
        .onglets-az button {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            color: #7f8c8d;
            margin: 5px 0;
            cursor: pointer;
            width: 100%;
            padding: 5px 0;
        }

        .liste-contacts {
            width: 300px;
            background-color: #ffffff;
            border-right: 1px solid #e2e8f0;
            padding: 60px 15px 15px 15px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .liste-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-ajouter-contact {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .ligne-contact {
            padding: 18px 15px;
            background-color: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.4rem;
            border-left: 4px solid #3498db;
        }
        .ligne-contact:hover {
            background-color: #e8f4fd;
            color: #3498db;
        }

        /* 3. Fiche Détail */
        .fiche-contact {
            flex: 1;
            background-color: #f5f6fa;
            padding: 60px 40px 40px 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .fiche-vide {
            text-align: center;
            color: #7f8c8d;
            margin-top: 50px;
            font-size: 1.2rem;
        }
        .fiche-active {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 700px;
            margin: 0 auto;
        }
        .fiche-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f5f6fa;
            padding-bottom: 25px;
        }
        .contact-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 30px;
            background-color: #eee;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .fiche-header h3 {
            font-size: 2.2rem;
            margin: 0;
            color: #2c3e50;
        }
        .fiche-details p {
            font-size: 1.4rem;
            margin: 20px 0;
            line-height: 1.6;
        }
        .fiche-details strong {
            color: #34495e;
            display: inline-block;
            min-width: 140px;
        }
        .lien-tel, .lien-mail {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }
        .lien-tel:hover, .lien-mail:hover {
            text-decoration: underline;
        }
        .fiche-actions {
            margin-top: 40px;
            border-top: 1px solid #f5f6fa;
            padding-top: 20px;
        }
        .btn-action {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 15px;
            font-size: 1.1rem;
        }
        .btn-modifier { background-color: #f1c40f; color: white; }
        .btn-supprimer { background-color: #e74c3c; color: white; }

        /* --- MODALE POP-UP FORMULAIRE AGRANDIE --- */
        .modal-formulaire {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ffffff;
            display: flex; justify-content: center; align-items: flex-start;
            z-index: 200;
            overflow-y: auto;
        }
        .contenu-formulaire {
            background: white; 
            padding: 30px 20px; 
            width: 100%; 
            max-width: 500px; 
            box-sizing: border-box;
        }
        .contenu-formulaire h3 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 25px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .contenu-formulaire label { 
            display: block; 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 1.3rem;
            color: #34495e;
        }
        .contenu-formulaire input[type="text"], .contenu-formulaire input[type="email"] {
            width: 100%; 
            padding: 16px; 
            margin-top: 8px; 
            box-sizing: border-box;
            border: 2px solid #bdc3c7; 
            border-radius: 8px;
            font-size: 1.4rem;
            background-color: #f8f9fa;
        }
        .contenu-formulaire input[type="text"]:focus, .contenu-formulaire input[type="email"]:focus {
            border-color: #3498db;
            background-color: #fff;
            outline: none;
        }
        .contenu-formulaire input[type="file"] {
            margin-top: 10px;
            font-size: 1.1rem;
        }
        .form-boutons { 
            margin-top: 40px; 
            display: flex;
            justify-content: space-between;
        }
        .btn-annuler { 
            background: #95a5a6; 
            color: white; 
            border: none; 
            padding: 16px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.2rem;
            flex: 1;
            margin-right: 15px;
            text-align: center;
        }
        .btn-valider { 
            background: #2ecc71; 
            color: white; 
            border: none; 
            padding: 16px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.2rem;
            flex: 1;
            text-align: center;
        }

        /* --- MODE SMARTPHONE (IPHONE) --- */
        @media (max-width: 768px) {
            .app-container {
                display: flex !important;
                flex-direction: column !important;
                height: 100vh;
            }
            .onglets-az {
                width: 100% !important;
                flex-direction: row !important;
                overflow-x: auto !important;
                padding: 60px 10px 10px 10px !important;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                box-sizing: border-box;
            }
            .onglets-az button {
                width: auto !important;
                padding: 5px 12px !important;
                margin: 0 2px !important;
            }
            .liste-contacts {
                width: 100% !important;
                flex: 1;
                padding: 15px !important;
                border-right: none;
            }
            .fiche-contact {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100% !important;
                height: 100vh;
                z-index: 99;
                background-color: white;
                padding: 20px !important;
            }
            .fiche-contact.mobile-active {
                display: block !important;
            }
            .fiche-active {
                padding: 20px;
                box-shadow: none;
            }
            .contact-photo {
                width: 90px;
                height: 90px;
                margin-right: 20px;
            }
            .fiche-header h3 {
                font-size: 1.8rem;
            }
            .fiche-details p {
                font-size: 1.2rem;
            }
            .fiche-details strong {
                min-width: auto;
                display: block;
                margin-bottom: 4px;
            }
            .btn-retour-liste {
                display: inline-block !important;
                background-color: #7f8c8d;
                color: white;
                border: none;
                padding: 12px 20px;
                border-radius: 6px;
                font-weight: bold;
                margin-bottom: 20px;
                cursor: pointer;
                font-size: 1.1rem;
            }
            
            .modal-formulaire {
                align-items: flex-start;
                background: #ffffff;
            }
            .contenu-formulaire {
                max-width: 100%;
                height: 100%;
                padding: 70px 20px 40px 20px;
            }
        }

        @media (min-width: 769px) {
            .btn-retour-liste { display: none !important; }
            .modal-formulaire {
                background: rgba(0,0,0,0.6);
                align-items: center;
            }
            .contenu-formulaire {
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            }
        }
    </style>
</head>
<body>

    <!-- PAGE DE GARDE STYLE CARNET PLEIN ÉCRAN -->
    <div id="pageGarde" class="page-garde">
        <div class="contenu-garde">
            <h1>Répertoire</h1>
            <p>Mes Contacts</p>
            <button onclick="verifierMotDePasse()" class="btn-entrer">Ouvrir</button>
        </div>
    </div>

    <!-- APPLICATION -->
    <div class="app-container cacher">
        <!-- BOUTON RETOUR PAGE DE GARDE -->
        <button onclick="fermerRepertoire()" class="btn-retour-garde">🚪 Fermer</button>

        <!-- 1. Onglets A-Z -->
        <nav class="onglets-az" id="ongletsAZ"></nav>

        <!-- 2. Liste des Contacts -->
        <section class="liste-contacts">
            <div class="liste-header">
                <h2>Contacts</h2>
                <button class="btn-ajouter-contact" onclick="ouvrirFormulaireAjouter()">➕ Ajouter</button>
            </div>
            <div id="zoneListe"></div>
        </section>

        <!-- 3. Fiche Détail -->
        <section class="fiche-contact" id="ficheContact">
            <button onclick="retourALaListe()" class="btn-retour-liste">⬅️ Retour à la liste</button>
            <h2>Détails du Contact</h2>
            <div id="zoneFiche" class="fiche-vide">
                <p>Sélectionnez un contact pour afficher ses coordonnées.</p>
            </div>
        </section>
    </div>

    <!-- POP-UP FORMULAIRE AGRANDI -->
    <div id="zoneFormulaire" class="modal-formulaire cacher">
        <div class="contenu-formulaire">
            <h3 id="formTitre">Nouveau Contact</h3>
            <form id="formContact" onsubmit="soumettreFormulaire(event)">
                <label>Nom et Prénom :</label>
                <input type="text" id="inputNom" required placeholder="Ex: Dupont Jean">
                <label>Téléphone Fixe :</label>
                <input type="text" id="inputFixe" placeholder="Ex: 01 02 03 04 05">
                <label>Téléphone Mobile :</label>
                <input type="text" id="inputMobile" placeholder="Ex: 06 07 08 09 10">
                
                <!-- NOUVEAU CHAMP E-MAIL -->
                <label>Adresse e-mail :</label>
                <input type="email" id="inputEmail" placeholder="Ex: jean.dupont@exemple.com">
                
                <label>Adresse postale :</label>
                <input type="text" id="inputAdresse" placeholder="Ex: 12 rue de la paix">
                <label>Photo :</label>
                <input type="file" id="inputPhoto" accept="image/*">
                <div class="form-boutons">
                    <button type="button" class="btn-annuler" onclick="fermerFormulaire()">Annuler</button>
                    <button type="submit" class="btn-valider">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT APPLICATION -->
    <script>
    const MOT_DE_PASSE_SECRET = "1953"; 

    let contacts = null;
    try {
        contacts = JSON.parse(localStorage.getItem("mes_contacts"));
    } catch (e) {}

    if (!contacts || contacts.length === 0) {
        contacts = [
            { id: 1, nom: "Abid Amine", fixe: "01 23 45 67 89", mobile: "06 12 34 56 78", email: "amine@exemple.com", adresse: "12 Rue de Paris, 75001 Paris", photo: "" },
            { id: 2, nom: "Bernard Chloé", fixe: "02 34 56 78 90", mobile: "07 89 01 23 45", email: "chloe.b@exemple.com", adresse: "45 Avenue de Lyon, 69002 Lyon", photo: "" },
            { id: 3, nom: "Dupont Jean", fixe: "03 45 67 89 01", mobile: "06 99 88 77 66", email: "j.dupont@exemple.com", adresse: "8 Boulevard de la Mer, 13008 Marseille", photo: "" }
        ];
        sauvegarder();
    }

    let lettreActive = "";
    let contactEnCoursDeModification = null;

    function sauvegarder() {
        try {
            localStorage.setItem("mes_contacts", JSON.stringify(contacts));
        } catch (e) {}
    }

    function verifierMotDePasse() {
        const saisie = prompt("Veuillez saisir le mot de passe pour accéder au répertoire :");
        
        if (saisie === MOT_DE_PASSE_SECRET) {
            ouvrirRepertoire();
        } else if (saisie !== null) {
            alert("Mot de passe incorrect ! Access refusé.");
        }
    }

    function ouvrirRepertoire() {
        document.getElementById("pageGarde").classList.add("cacher");
        document.getElementById("ongletsAZ").parentElement.classList.remove("cacher");
        lettreActive = ""; 
        genererAlphabet();
        retourALaListe();
        const zoneListe = document.getElementById("zoneListe");
        if (zoneListe) {
            zoneListe.innerHTML = `<p style="color:#7f8c8d; padding:10px; text-align:center;">Choisissez une lettre pour afficher les contacts.</p>`;
        }
    }

    function fermerRepertoire() {
        document.getElementById("pageGarde").classList.remove("cacher");
        document.getElementById("ongletsAZ").parentElement.classList.add("cacher");
        retourALaListe();
        const zoneFiche = document.getElementById("zoneFiche");
        if (zoneFiche) {
            zoneFiche.className = "fiche-vide";
            zoneFiche.innerHTML = `<p>Sélectionnez un contact pour afficher ses coordonnées.</p>`;
        }
    }

    function retourALaListe() {
        document.getElementById("ficheContact").classList.remove("mobile-active");
    }

    function genererAlphabet() {
        const zoneOnglets = document.getElementById("ongletsAZ");
        if (!zoneOnglets) return;
        zoneOnglets.innerHTML = "";
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(lettre => {
            const bouton = document.createElement("button");
            bouton.textContent = lettre;
            if (lettreActive && lettre === lettreActive) bouton.style.color = "#3498db";
            bouton.onclick = () => {
                lettreActive = lettre;
                genererAlphabet();
                filtrerContacts(lettre);
                retourALaListe();
            };
            zoneOnglets.appendChild(bouton);
        });
    }

    function filtrerContacts(lettre) {
        const zoneFiche = document.getElementById("zoneFiche");
        if (zoneFiche) {
            zoneFiche.className = "fiche-vide";
            zoneFiche.innerHTML = `<p>Sélectionnez un contact pour afficher ses coordonnées.</p>`;
        }
        const zoneListe = document.getElementById("zoneListe");
        if (!zoneListe) return;
        zoneListe.innerHTML = "";
        
        const contactsFiltres = contacts.filter(c => c.nom && c.nom.toUpperCase().startsWith(lettre));
        if (contactsFiltres.length === 0) {
            zoneListe.innerHTML = `<p style="color:#7f8c8d; padding:10px; text-align:center;">Aucun contact en ${lettre}</p>`;
            return;
        }
        
        contactsFiltres.sort((a, b) => a.nom.localeCompare(b.nom));
        contactsFiltres.forEach(contact => {
            const ligne = document.createElement("div");
            ligne.className = "ligne-contact";
            ligne.textContent = contact.nom;
            ligne.onclick = () => afficherFiche(contact);
            zoneListe.appendChild(ligne);
        });
    }

    function nettoiementTel(numero) {
        return numero ? numero.replace(/[^0-9+]/g, '') : '';
    }

    function afficherFiche(contact) {
        const zoneFiche = document.getElementById("zoneFiche");
        if (!zoneFiche) return;
        const photoAffichage = contact.photo ? contact.photo : "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        
        const lienFixe = nettoiementTel(contact.fixe);
        const lienMobile = nettoiementTel(contact.mobile);

        const affichageFixe = contact.fixe ? `<a href="tel:${lienFixe}" class="lien-tel">${contact.fixe}</a>` : 'Non renseigné';
        const affichageMobile = contact.mobile ? `<a href="tel:${lienMobile}" class="lien-tel">${contact.mobile}</a>` : 'Non renseigné';
        
        // Affichage dynamique de l'e-mail avec lien cliquable
        const affichageEmail = contact.email ? `<a href="mailto:${contact.email}" class="lien-mail">${contact.email}</a>` : 'Non renseigné';

        zoneFiche.className = "fiche-active";
        zoneFiche.innerHTML = `
            <div class="fiche-header">
                <img src="${photoAffichage}" alt="Photo" class="contact-photo">
                <h3>${contact.nom}</h3>
            </div>
            <div class="fiche-details">
                <p><strong>📞 Fixe :</strong> ${affichageFixe}</p>
                <p><strong>📱 Mobile :</strong> ${affichageMobile}</p>
                <p><strong>📧 @ Mail :</strong> ${affichageEmail}</p>
                <p><strong>🏠 Adresse :</strong> ${contact.adresse ? contact.adresse : 'Non renseignée'}</p>
            </div>
            <div class="fiche-actions">
                <button class="btn-action btn-modifier" onclick="ouvrirFormulaireModifier(${contact.id})">✏️ Modifier</button>
                <button class="btn-action btn-supprimer" onclick="supprimerContact(${contact.id})">🗑️ Supprimer</button>
            </div>
        `;
        document.getElementById("ficheContact").classList.add("mobile-active");
    }

    function ouvrirFormulaireAjouter() {
        contactEnCoursDeModification = null;
        document.getElementById("formTitre").textContent = "Nouveau Contact";
        document.getElementById("formContact").reset();
        document.getElementById("zoneFormulaire").classList.remove("cacher");
    }

    function ouvrirFormulaireModifier(id) {
        const contact = contacts.find(c => c.id === id);
        if (!contact) return;
        contactEnCoursDeModification = id;
        document.getElementById("formTitre").textContent = "Modifier le Contact";
        document.getElementById("inputNom").value = contact.nom || "";
        document.getElementById("inputFixe").value = contact.fixe || "";
        document.getElementById("inputMobile").value = contact.mobile || "";
        document.getElementById("inputEmail").value = contact.email || ""; // Charge le mail existant
        document.getElementById("inputAdresse").value = contact.adresse || "";
        document.getElementById("zoneFormulaire").classList.remove("cacher");
    }

    function fermerFormulaire() {
        document.getElementById("zoneFormulaire").classList.add("cacher");
    }

    function soumettreFormulaire(event) {
        event.preventDefault();
        const fichierPhoto = document.getElementById("inputPhoto").files[0];
        
        function enregistrerLeContact(photoData) {
            const nouveauContact = {
                id: contactEnCoursDeModification ? contactEnCoursDeModification : Date.now(),
                nom: document.getElementById("inputNom").value,
                fixe: document.getElementById("inputFixe").value,
                mobile: document.getElementById("inputMobile").value,
                email: document.getElementById("inputEmail").value, // Récupère le mail
                adresse: document.getElementById("inputAdresse").value,
                photo: photoData
            };

            if (contactEnCoursDeModification) {
                if (!fichierPhoto) {
                    const ancienContact = contacts.find(c => c.id === contactEnCoursDeModification);
                    nouveauContact.photo = ancienContact ? ancienContact.photo : "";
                }
                contacts = contacts.map(c => c.id === contactEnCoursDeModification ? nouveauContact : c);
            } else {
                contacts.push(nouveauContact);
            }

            sauvegarder();
            fermerFormulaire();
            if (nouveauContact.nom) lettreActive = nouveauContact.nom.charAt(0).toUpperCase();
            genererAlphabet();
            filtrerContacts(lettreActive);
            afficherFiche(nouveauContact);
        }

        if (fichierPhoto) {
            const reader = new FileReader();
            reader.onload = function(e) { enregistrerLeContact(e.target.result); };
            reader.readAsDataURL(fichierPhoto);
        } else {
            enregistrerLeContact("");
        }
    }

    function supprimerContact(id) {
        if (confirm("Êtes-vous sûr de vouloir supprimer ce contact ?")) {
            contacts = contacts.filter(c => c.id !== id);
            sauvegarder();
            filtrerContacts(lettreActive);
            retourALaListe();
        }
    }
    </script>
</body>
</html>
